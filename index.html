<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄语高考词汇</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --paper-bg: #f5f0e1;
            --paper-dark: #e8e0cc;
            --paper-card: #faf6eb;
            --ink-primary: #2c2416;
            --ink-secondary: #5a4d3a;
            --ink-light: #8b7d65;
            --accent-blue: #4682b4;
            --accent-orange: #cd853f;
            --accent-green: #556b2f;
            --accent-red: #a0522d;
            --accent-purple: #7b68ee;
            --accent-yellow: #daa520;
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #d4cbb8 0%, #c9c0ad 100%);
            min-height: 100vh;
            color: var(--ink-primary);
            padding-bottom: 80px;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 15px; }

        /* Header */
        .header {
            background: var(--paper-bg);
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--ink-light);
            text-align: center;
        }
        .brand-ru {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--ink-primary);
        }
        .brand-zh { font-size: 12px; color: var(--ink-light); letter-spacing: 4px; }
        .stats-row { display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .stat-item { text-align: center; }
        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
        }
        .stat-number.blue { color: var(--accent-blue); }
        .stat-number.purple { color: var(--accent-purple); }
        .stat-number.green { color: var(--accent-green); }
        .stat-number.orange { color: var(--accent-orange); }
        .stat-label { font-size: 10px; color: var(--ink-light); letter-spacing: 1px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--paper-bg);
            border-top: 1px solid var(--ink-light);
            display: flex;
            z-index: 100;
        }
        .nav-btn {
            flex: 1;
            padding: 12px 5px;
            background: transparent;
            border: none;
            color: var(--ink-secondary);
            font-family: 'Noto Serif SC', serif;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-btn i { font-size: 18px; }
        .nav-btn.active { color: var(--accent-blue); }

        /* Pages */
        .page { display: none; }

        /* Word List */
        .search-section {
            background: var(--paper-bg);
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--ink-light);
        }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: var(--paper-card);
            border: 1px solid var(--ink-light);
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            color: var(--ink-primary);
            outline: none;
            margin-bottom: 10px;
        }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 15px;
            background: var(--paper-card);
            border: 1px solid var(--ink-light);
            color: var(--ink-secondary);
            font-size: 12px;
            cursor: pointer;
        }
        .filter-btn.active { background: var(--ink-primary); color: var(--paper-bg); }
        .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .word-card {
            background: var(--paper-bg);
            border: 1px solid var(--ink-light);
            padding: 15px;
            cursor: pointer;
            position: relative;
            border-left: 3px solid var(--ink-light);
        }
        .word-card.new { border-left-color: var(--accent-blue); }
        .word-card.review { border-left-color: var(--accent-purple); }
        .word-card.learned { border-left-color: var(--accent-green); }
        .word-card.mastered { border-left-color: var(--accent-orange); }
        .word-russian {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .word-meaning {
            font-size: 12px;
            color: var(--ink-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .word-meta { font-size: 10px; color: var(--ink-light); margin-top: 5px; }

        /* Learn Page */
        .learn-container { max-width: 600px; margin: 0 auto; }
        .learn-start {
            background: var(--paper-bg);
            border: 1px solid var(--ink-light);
            padding: 30px 20px;
            text-align: center;
        }
        .learn-start h2 { font-size: 24px; margin-bottom: 15px; }
        .learn-stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .learn-stat { text-align: center; }
        .learn-stat .num {
            font-size: 36px;
            font-weight: 900;
            font-family: 'Playfair Display', serif;
        }
        .learn-stat .label { font-size: 12px; color: var(--ink-light); }
        .start-btn {
            padding: 15px 50px;
            background: var(--accent-blue);
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .start-btn:disabled { background: var(--ink-light); cursor: not-allowed; }
        .start-btn.orange { background: var(--accent-orange); }

        /* Card */
        .card-section {
            background: var(--paper-bg);
            border: 1px solid var(--ink-light);
            margin-bottom: 15px;
        }
        .card-progress {
            padding: 15px;
            border-bottom: 1px solid var(--ink-light);
        }
        .progress-bar { height: 6px; background: var(--paper-dark); border-radius: 3px; }
        .progress-fill { height: 100%; background: var(--accent-blue); border-radius: 3px; transition: width 0.3s; }
        .progress-text { text-align: center; margin-top: 8px; font-size: 12px; color: var(--ink-light); }
        .card-content {
            padding: 40px 20px;
            text-align: center;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card-word {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 15px;
        }
        .card-hint { font-size: 14px; color: var(--ink-light); margin-bottom: 20px; }
        .card-meaning {
            font-size: 18px;
            line-height: 1.8;
            color: var(--ink-secondary);
            margin-bottom: 20px;
        }
        .flip-btn {
            padding: 12px 40px;
            background: var(--paper-card);
            border: 1px solid var(--ink-light);
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
        }
        .rating-section {
            display: none;
            padding: 20px;
            border-top: 1px solid var(--ink-light);
        }
        .rating-section.show { display: block; }
        .rating-label { text-align: center; font-size: 14px; color: var(--ink-secondary); margin-bottom: 15px; }
        .rating-btns { display: flex; gap: 10px; }
        .rating-btn {
            flex: 1;
            padding: 15px 10px;
            border: 1px solid var(--ink-light);
            font-family: 'Noto Serif SC', serif;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }
        .rating-btn.forget { background: #fdeaea; color: var(--accent-red); }
        .rating-btn.hard { background: #fff8e1; color: var(--accent-yellow); }
        .rating-btn.easy { background: #e8f5e9; color: var(--accent-green); }
        .rating-btn .time { display: block; font-size: 11px; margin-top: 5px; color: var(--ink-light); }

        /* Complete */
        .complete-section {
            background: var(--paper-bg);
            border: 1px solid var(--ink-light);
            padding: 40px 20px;
            text-align: center;
            display: none;
        }
        .complete-section.show { display: block; }
        .complete-section h2 { font-size: 24px; margin-bottom: 20px; }
        .complete-stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; flex-wrap: wrap; }
        .complete-stat .num {
            font-size: 36px;
            font-weight: 900;
            font-family: 'Playfair Display', serif;
            color: var(--accent-blue);
        }

        /* Quiz Mode */
        .quiz-container { max-width: 600px; margin: 0 auto; }

        /* Quiz Type A - Choice */
        .quiz-choice-section {
            background: var(--paper-bg);
            border: 1px solid var(--ink-light);
            margin-bottom: 15px;
        }
        .quiz-content {
            padding: 40px 20px;
            text-align: center;
        }
        .quiz-word {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 30px;
        }
        .quiz-options { display: flex; flex-direction: column; gap: 12px; padding: 0 20px 20px; }
        .quiz-option {
            padding: 15px 20px;
            background: var(--paper-card);
            border: 2px solid var(--ink-light);
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .quiz-option:hover { border-color: var(--accent-blue); }
        .quiz-option.correct { background: #e8f5e9; border-color: var(--accent-green); color: var(--accent-green); }
        .quiz-option.wrong { background: #fdeaea; border-color: var(--accent-red); color: var(--accent-red); }
        .quiz-option.disabled { pointer-events: none; opacity: 0.7; }

        /* Quiz Type B - Spelling */
        .quiz-spell-section {
            background: var(--paper-bg);
            border: 1px solid var(--ink-light);
            margin-bottom: 15px;
        }
        .spell-prompt {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--ink-light);
        }
        .spell-meaning {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .spell-hint {
            font-size: 13px;
            color: var(--ink-light);
        }
        .spell-area {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .spell-slots {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .spell-slot {
            width: 44px;
            height: 52px;
            background: var(--paper-card);
            border: 2px solid var(--ink-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .spell-slot.filled {
            background: var(--paper-dark);
            border-color: var(--accent-blue);
        }
        .spell-slot.error {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
        .spell-slot.correct {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
        .spell-pool {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 100%;
        }
        .spell-tile {
            width: 44px;
            height: 44px;
            background: var(--paper-card);
            border: 2px solid var(--ink-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }
        .spell-tile:hover { background: var(--paper-dark); border-color: var(--accent-blue); }
        .spell-tile.used { opacity: 0.3; pointer-events: none; }
        .spell-submit {
            margin-top: 20px;
            padding: 12px 40px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
        .spell-submit.show { display: inline-block; }

        /* Next Button */
        .quiz-next-btn, .spell-correct-answer {
            padding: 20px;
            text-align: center;
            border-top: 1px solid var(--ink-light);
        }
        .next-btn {
            padding: 12px 40px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
        }
        .next-btn:hover { background: #3a6d99; }
        .correct-label {
            font-size: 14px;
            color: var(--ink-light);
            margin-bottom: 8px;
        }
        .correct-word {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 15px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

        @keyframes flash-green {
            0%, 100% { background: var(--paper-card); }
            50% { background: #e8f5e9; }
        }
        .flash-correct { animation: flash-green 0.5s ease-in-out 2; }

        /* Quiz Result */
        .quiz-result {
            background: var(--paper-bg);
            border: 1px solid var(--ink-light);
            padding: 40px 20px;
            text-align: center;
        }
        .quiz-result h2 { font-size: 24px; margin-bottom: 10px; }
        .quiz-score-big {
            font-size: 64px;
            font-weight: 900;
            font-family: 'Playfair Display', serif;
            color: var(--accent-blue);
        }
        .quiz-percent { font-size: 18px; color: var(--ink-secondary); margin-bottom: 20px; }

        /* AI Panel */
        .ai-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--paper-bg);
            z-index: 200;
            display: none;
            flex-direction: column;
        }
        .ai-panel.show { display: flex; }
        .ai-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--ink-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ai-title { font-size: 20px; font-weight: 700; }
        .ai-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--ink-light);
            cursor: pointer;
        }
        .ai-content { flex: 1; padding: 20px; overflow-y: auto; line-height: 1.8; font-size: 14px; }
        .ai-loading { text-align: center; padding: 40px; color: var(--ink-light); }
        .ai-loading i { font-size: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Settings */
        .settings-container {
            background: var(--paper-bg);
            border: 1px solid var(--ink-light);
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .settings-title { font-size: 20px; margin-bottom: 20px; }
        .setting-item { margin-bottom: 20px; }
        .setting-label { font-size: 12px; color: var(--ink-light); margin-bottom: 8px; display: block; }
        .setting-input {
            width: 100%;
            padding: 12px;
            background: var(--paper-card);
            border: 1px solid var(--ink-light);
            font-size: 14px;
        }
        .setting-btn {
            width: 100%;
            padding: 15px;
            background: var(--ink-primary);
            border: none;
            color: var(--paper-bg);
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .setting-btn.danger { background: var(--accent-red); }

        /* Desktop */
        @media (min-width: 768px) {
            .container { padding: 30px; }
            .header { padding: 40px; }
            .brand-ru { font-size: 48px; }
            .bottom-nav { display: none; }
            .nav-bar {
                display: flex;
                justify-content: center;
                margin-bottom: 30px;
                background: var(--paper-bg);
                border: 1px solid var(--ink-light);
            }
            .nav-bar .nav-btn {
                padding: 18px 40px;
                font-size: 15px;
                flex-direction: row;
                gap: 8px;
            }
            .word-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
            .card-word { font-size: 64px; }
            .quiz-word { font-size: 56px; }
            .ai-panel { left: auto; width: 500px; border-left: 1px solid var(--ink-light); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="brand-ru">РУССКИЙ</div>
            <div class="brand-zh">俄语高考词汇</div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-number blue">1952</div>
                    <div class="stat-label">总词汇</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number purple" id="stat-review">0</div>
                    <div class="stat-label">待复习</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number green" id="stat-learned">0</div>
                    <div class="stat-label">已学习</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number orange" id="stat-mastered">0</div>
                    <div class="stat-label">已掌握</div>
                </div>
            </div>
        </header>

        <!-- Desktop Nav -->
        <nav class="nav-bar" style="display: none;">
            <button class="nav-btn active" data-page="list"><i class="fas fa-book-open"></i> 词库</button>
            <button class="nav-btn" data-page="learn"><i class="fas fa-graduation-cap"></i> 学习</button>
            <button class="nav-btn" data-page="quiz"><i class="fas fa-pen"></i> 测验</button>
            <button class="nav-btn" data-page="settings"><i class="fas fa-cog"></i> 设置</button>
        </nav>

        <!-- List Page -->
        <div id="page-list" class="page" style="display: block;">
            <div class="search-section">
                <input type="text" class="search-input" id="search-input" placeholder="搜索单词或释义...">
                <div class="filter-row">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="new">新词</button>
                    <button class="filter-btn" data-filter="review">待复习</button>
                    <button class="filter-btn" data-filter="learned">已学</button>
                    <button class="filter-btn" data-filter="mastered">已掌握</button>
                </div>
            </div>
            <div class="word-grid" id="word-grid"></div>
        </div>

        <!-- Learn Page -->
        <div id="page-learn" class="page">
            <div class="learn-container">
                <div class="learn-start" id="learn-start">
                    <h2>今日学习</h2>
                    <div class="learn-stats">
                        <div class="learn-stat">
                            <div class="num" style="color: var(--accent-purple);" id="today-review">0</div>
                            <div class="label">待复习</div>
                        </div>
                        <div class="learn-stat">
                            <div class="num" style="color: var(--accent-blue);" id="today-new">0</div>
                            <div class="label">新词</div>
                        </div>
                    </div>
                    <button class="start-btn" id="start-btn" onclick="startLearning()">开始学习</button>
                </div>

                <div class="card-section" id="card-section" style="display: none;">
                    <div class="card-progress">
                        <div class="progress-bar"><div class="progress-fill" id="card-progress-fill"></div></div>
                        <div class="progress-text" id="card-progress-text">1 / 20</div>
                    </div>
                    <div class="card-content" id="card-content">
                        <div class="card-word" id="card-word"></div>
                        <div class="card-hint" id="card-hint">点击下方按钮查看释义</div>
                        <div class="card-meaning" id="card-meaning" style="display: none;"></div>
                        <button class="flip-btn" id="flip-btn" onclick="flipCard()">翻开</button>
                    </div>
                    <div class="rating-section" id="rating-section">
                        <div class="rating-label">你记住了吗？</div>
                        <div class="rating-btns">
                            <button class="rating-btn forget" onclick="rateCard(1)">
                                <div>忘记</div>
                                <div class="time" id="time-forget">1天后</div>
                            </button>
                            <button class="rating-btn hard" onclick="rateCard(2)">
                                <div>困难</div>
                                <div class="time" id="time-hard">-</div>
                            </button>
                            <button class="rating-btn easy" onclick="rateCard(3)">
                                <div>容易</div>
                                <div class="time" id="time-easy">-</div>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="complete-section" id="complete-section">
                    <h2>学习完成！</h2>
                    <div class="complete-stats">
                        <div class="complete-stat"><div class="num" id="complete-total">0</div><div class="label">学习</div></div>
                        <div class="complete-stat"><div class="num" id="complete-easy">0</div><div class="label">容易</div></div>
                        <div class="complete-stat"><div class="num" id="complete-hard">0</div><div class="label">困难</div></div>
                        <div class="complete-stat"><div class="num" id="complete-forget">0</div><div class="label">忘记</div></div>
                    </div>
                    <button class="start-btn" onclick="finishLearning()">完成</button>
                </div>
            </div>
        </div>

        <!-- Quiz Page -->
        <div id="page-quiz" class="page">
            <div class="quiz-container">
                <div class="learn-start" id="quiz-start">
                    <h2>测验模式</h2>
                    <p style="color: var(--ink-secondary); margin-bottom: 20px;">测试你对已学单词的掌握程度</p>
                    <div class="learn-stats">
                        <div class="learn-stat">
                            <div class="num" style="color: var(--accent-orange);" id="quiz-learned-count">0</div>
                            <div class="label">已学单词</div>
                        </div>
                    </div>
                    <button class="start-btn orange" id="start-quiz-btn" onclick="startQuiz()">开始测验</button>
                </div>

                <div class="card-section" id="quiz-card-section" style="display: none;">
                    <div class="card-progress">
                        <div class="progress-bar"><div class="progress-fill" id="quiz-progress-fill"></div></div>
                        <div class="progress-text" id="quiz-progress-text">1 / 10</div>
                    </div>
                </div>

                <!-- Quiz Type A -->
                <div class="quiz-choice-section" id="quiz-choice" style="display: none;">
                    <div class="quiz-content">
                        <div class="quiz-word" id="quiz-choice-word"></div>
                    </div>
                    <div class="quiz-options" id="quiz-choice-options"></div>
                    <div class="quiz-next-btn" id="quiz-choice-next" style="display: none;">
                        <button class="next-btn" onclick="nextQuizQuestion()">下一题</button>
                    </div>
                </div>

                <!-- Quiz Type B -->
                <div class="quiz-spell-section" id="quiz-spell" style="display: none;">
                    <div class="spell-prompt">
                        <div class="spell-meaning" id="spell-meaning"></div>
                        <div class="spell-hint" id="spell-hint">点击字母拼写俄语单词</div>
                    </div>
                    <div class="spell-area">
                        <div class="spell-slots" id="spell-slots"></div>
                        <div class="spell-pool" id="spell-pool"></div>
                        <button class="spell-submit" id="spell-submit" onclick="checkSpelling()">确认</button>
                    </div>
                    <div class="spell-correct-answer" id="spell-correct-answer" style="display: none;">
                        <div class="correct-label">正确答案：</div>
                        <div class="correct-word" id="spell-correct-word"></div>
                        <button class="next-btn" onclick="nextQuizQuestion()">下一题</button>
                    </div>
                </div>

                <div class="quiz-result" id="quiz-result" style="display: none;">
                    <h2>测验完成</h2>
                    <div class="quiz-score-big" id="quiz-score">0 / 10</div>
                    <div class="quiz-percent" id="quiz-percent">正确率: 0%</div>
                    <button class="start-btn orange" onclick="finishQuiz()">完成</button>
                </div>
            </div>
        </div>

        <!-- Settings Page -->
        <div id="page-settings" class="page">
            <div class="settings-container">
                <h2 class="settings-title">学习设置</h2>
                <div class="setting-item">
                    <label class="setting-label">每次新词数量</label>
                    <input type="number" class="setting-input" id="new-words-per-day" value="10" min="3" max="50">
                </div>
                <div class="setting-item">
                    <label class="setting-label">每日最大复习数</label>
                    <input type="number" class="setting-input" id="max-review-per-day" value="100" min="20" max="500">
                </div>
                <button class="setting-btn" onclick="saveSettings()">保存设置</button>
                <button class="setting-btn danger" onclick="resetProgress()">重置所有进度</button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-page="list"><i class="fas fa-book-open"></i> 词库</button>
        <button class="nav-btn" data-page="learn"><i class="fas fa-graduation-cap"></i> 学习</button>
        <button class="nav-btn" data-page="quiz"><i class="fas fa-pen"></i> 测验</button>
        <button class="nav-btn" data-page="settings"><i class="fas fa-cog"></i> 设置</button>
    </nav>

    <!-- AI Panel -->
    <div class="ai-panel" id="ai-panel">
        <div class="ai-header">
            <div class="ai-title" id="ai-word"></div>
            <button class="ai-close" onclick="closeAiPanel()"><i class="fas fa-times"></i></button>
        </div>
        <div class="ai-content" id="ai-content"></div>
    </div>

    <script src="words_data.js"></script>
    <script>
        // ==================== 配置 ====================
        const STORAGE_KEY = 'ru_vocab_progress';
        const SETTINGS_KEY = 'ru_vocab_settings';
        const DEFAULT_SETTINGS = { newWordsPerDay: 10, maxReviewPerDay: 100 };

        const APIS = [
            { name: 'API-1', url: 'https://2c2ch1u11-share-api-0.hf.space/v1/chat/completions',
              key: 'sk-33e44b94-e520-4e7d-8dff-1c3ccd87bea8', model: 'deepseek-v4-flash' },
            { name: 'API-2', url: 'https://cujricrx.ap-northeast-1.clawcloudrun.com/v1/chat/completions',
              key: 'sk-oyRlK0JmEsqBV4iu8nKnCPgxbYLjGFm2aqccTHuMPldfSNNW', model: 'deepseek-ai/DeepSeek-V3.2' }
        ];

        // 俄语易混淆字母
        const CONFUSING_LETTERS = ['ш', 'щ', 'ч', 'ь', 'ъ', 'и', 'й', 'а', 'о', 'е', 'ё', 'э', 'ы', 'и'];
        const RUSSIAN_ALPHABET = 'абвгдеёжзийклмнопрстуфхцчшщъыьэюя'.split('');

        // ==================== 状态 ====================
        let progress = {};
        let settings = { ...DEFAULT_SETTINGS };
        let currentPage = 'list';
        let currentFilter = 'all';

        // 学习状态
        let studyQueue = [];
        let currentIndex = 0;
        let cardFlipped = false;
        let sessionStats = { total: 0, easy: 0, hard: 0, forget: 0 };

        // 测验状态
        let quizQuestions = [];
        let quizIndex = 0;
        let quizScore = 0;
        let currentSpellAnswer = '';
        let spellSlots = [];

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadProgress();
            loadSettings();
            updateStats();
            renderWordList();
            setupEventListeners();
            updateLearnStart();
            updateQuizStart();

            if (window.innerWidth >= 768) {
                document.querySelector('.nav-bar').style.display = 'flex';
            }
        });

        function loadProgress() {
            const saved = localStorage.getItem(STORAGE_KEY);
            progress = saved ? JSON.parse(saved) : {};
        }

        function saveProgress() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        }

        function loadSettings() {
            const saved = localStorage.getItem(SETTINGS_KEY);
            if (saved) settings = { ...DEFAULT_SETTINGS, ...JSON.parse(saved) };
            document.getElementById('new-words-per-day').value = settings.newWordsPerDay;
            document.getElementById('max-review-per-day').value = settings.maxReviewPerDay;
        }

        function saveSettings() {
            settings.newWordsPerDay = parseInt(document.getElementById('new-words-per-day').value) || 10;
            settings.maxReviewPerDay = parseInt(document.getElementById('max-review-per-day').value) || 100;
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
            alert('设置已保存！');
            updateLearnStart();
            updateQuizStart();
        }

        function setupEventListeners() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => switchPage(btn.dataset.page));
            });
            document.getElementById('search-input').addEventListener('input', (e) => renderWordList(e.target.value));
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderWordList(document.getElementById('search-input').value);
                });
            });
        }

        // ==================== 页面切换 ====================
        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === page);
            });
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + page).style.display = 'block';

            if (page === 'learn') updateLearnStart();
            if (page === 'quiz') updateQuizStart();
        }

        // ==================== 统计 ====================
        function updateStats() {
            const now = Date.now();
            let reviewCount = 0, learnedCount = 0, masteredCount = 0;

            Object.values(progress).forEach(p => {
                if (p.next_review_date) {
                    if (p.next_review_date <= now) reviewCount++;
                    else learnedCount++;
                }
                if (p.interval >= 21) masteredCount++;
            });

            document.getElementById('stat-review').textContent = reviewCount;
            document.getElementById('stat-learned').textContent = learnedCount;
            document.getElementById('stat-mastered').textContent = masteredCount;
        }

        // ==================== 词库列表 ====================
        function renderWordList(filter = '') {
            const grid = document.getElementById('word-grid');
            const now = Date.now();

            let filtered = words.filter(w => {
                const matchSearch = w.word.toLowerCase().includes(filter.toLowerCase()) || w.meaning.includes(filter);
                const p = progress[w.word];
                let status = 'new';
                if (p) {
                    if (p.interval >= 21) status = 'mastered';
                    else if (p.next_review_date && p.next_review_date <= now) status = 'review';
                    else if (p.next_review_date) status = 'learned';
                }
                return matchSearch && (currentFilter === 'all' || currentFilter === status);
            });

            grid.innerHTML = filtered.map(w => {
                const p = progress[w.word];
                let cardClass = 'new', meta = '';
                if (p) {
                    if (p.interval >= 21) { cardClass = 'mastered'; meta = `间隔 ${p.interval} 天`; }
                    else if (p.next_review_date && p.next_review_date <= now) { cardClass = 'review'; meta = '待复习'; }
                    else if (p.next_review_date) {
                        cardClass = 'learned';
                        const days = Math.ceil((p.next_review_date - now) / 86400000);
                        meta = `${days}天后复习`;
                    }
                }
                return `<div class="word-card ${cardClass}" onclick="showAiExplanation('${w.word}', '${w.meaning.replace(/'/g, "\\'")}')">
                    <div class="word-russian">${w.word}</div>
                    <div class="word-meaning">${w.meaning}</div>
                    <div class="word-meta">${meta}</div>
                </div>`;
            }).join('');
        }

        // ==================== 学习流程 ====================
        function updateLearnStart() {
            const now = Date.now();
            const reviewWords = words.filter(w => {
                const p = progress[w.word];
                return p && p.next_review_date && p.next_review_date <= now && p.interval < 21;
            });
            const newWords = words.filter(w => !progress[w.word]);

            document.getElementById('today-review').textContent = Math.min(reviewWords.length, settings.maxReviewPerDay);
            document.getElementById('today-new').textContent = Math.min(newWords.length, settings.newWordsPerDay);
            document.getElementById('start-btn').disabled = (reviewWords.length + newWords.length) === 0;
        }

        function startLearning() {
            const now = Date.now();
            const reviewWords = words.filter(w => {
                const p = progress[w.word];
                return p && p.next_review_date && p.next_review_date <= now && p.interval < 21;
            }).slice(0, settings.maxReviewPerDay);
            const newWords = words.filter(w => !progress[w.word]).slice(0, settings.newWordsPerDay);

            studyQueue = [...reviewWords, ...newWords];
            shuffleArray(studyQueue);
            if (studyQueue.length === 0) { alert('今日学习已完成！'); return; }

            currentIndex = 0;
            sessionStats = { total: studyQueue.length, easy: 0, hard: 0, forget: 0 };

            document.getElementById('learn-start').style.display = 'none';
            document.getElementById('card-section').style.display = 'block';
            document.getElementById('complete-section').classList.remove('show');
            showCard();
        }

        function showCard() {
            if (currentIndex >= studyQueue.length) { showComplete(); return; }

            const word = studyQueue[currentIndex];
            cardFlipped = false;

            document.getElementById('card-word').textContent = word.word;
            document.getElementById('card-hint').style.display = 'block';
            document.getElementById('card-meaning').style.display = 'none';
            document.getElementById('flip-btn').style.display = 'inline-block';
            document.getElementById('rating-section').classList.remove('show');

            document.getElementById('card-progress-fill').style.width = ((currentIndex + 1) / studyQueue.length * 100) + '%';
            document.getElementById('card-progress-text').textContent = `${currentIndex + 1} / ${studyQueue.length}`;
            updateRatingTimes(word.word);
        }

        function updateRatingTimes(wordId) {
            const p = progress[wordId] || { interval: 0, ease_factor: 2.5 };
            document.getElementById('time-forget').textContent = '1天后';
            document.getElementById('time-hard').textContent = (Math.ceil((p.interval || 0) * 1.2) || 1) + '天后';
            let easyInterval = p.interval === 0 ? 1 : p.interval === 1 ? 3 : Math.ceil(p.interval * (p.ease_factor || 2.5));
            document.getElementById('time-easy').textContent = easyInterval + '天后';
        }

        function flipCard() {
            if (cardFlipped) return;
            cardFlipped = true;

            const word = studyQueue[currentIndex];
            document.getElementById('card-hint').style.display = 'none';
            document.getElementById('card-meaning').textContent = word.meaning;
            document.getElementById('card-meaning').style.display = 'block';
            document.getElementById('flip-btn').style.display = 'none';
            document.getElementById('rating-section').classList.add('show');
        }

        // ==================== SRS 核心算法 ====================
        function calculateNextReview(wordId, quality) {
            const now = Date.now();
            const p = progress[wordId] || { interval: 0, ease_factor: 2.5 };
            let newInterval, newEaseFactor = p.ease_factor || 2.5;

            if (quality === 1) {
                newInterval = 1;
                newEaseFactor = Math.max(1.3, newEaseFactor - 0.2);
            } else if (quality === 2) {
                newInterval = Math.ceil((p.interval || 0) * 1.2) || 1;
                newEaseFactor = Math.max(1.3, newEaseFactor - 0.15);
            } else {
                if (p.interval === 0) newInterval = 1;
                else if (p.interval === 1) newInterval = 3;
                else newInterval = Math.ceil(p.interval * newEaseFactor);
                newEaseFactor += 0.1;
            }

            progress[wordId] = { interval: newInterval, ease_factor: newEaseFactor, next_review_date: now + newInterval * 86400000 };
            saveProgress();
        }

        function rateCard(quality) {
            const word = studyQueue[currentIndex];
            calculateNextReview(word.word, quality);

            if (quality === 1) sessionStats.forget++;
            else if (quality === 2) sessionStats.hard++;
            else sessionStats.easy++;

            currentIndex++;
            showCard();
        }

        function showComplete() {
            document.getElementById('card-section').style.display = 'none';
            document.getElementById('complete-section').classList.add('show');
            document.getElementById('complete-total').textContent = sessionStats.total;
            document.getElementById('complete-easy').textContent = sessionStats.easy;
            document.getElementById('complete-hard').textContent = sessionStats.hard;
            document.getElementById('complete-forget').textContent = sessionStats.forget;
            updateStats();
        }

        function finishLearning() {
            document.getElementById('learn-start').style.display = 'block';
            document.getElementById('complete-section').classList.remove('show');
            updateLearnStart();
        }

        // ==================== 测验模式 ====================
        function updateQuizStart() {
            const learnedWords = words.filter(w => progress[w.word]?.interval > 0);
            document.getElementById('quiz-learned-count').textContent = learnedWords.length;
            document.getElementById('start-quiz-btn').disabled = learnedWords.length === 0;
        }

        function startQuiz() {
            // 筛选已学单词 (interval > 0)
            let learnedWords = words.filter(w => progress[w.word]?.interval > 0);

            // 如果不足10个，从所有单词补充
            if (learnedWords.length < 10) {
                const otherWords = words.filter(w => !learnedWords.includes(w));
                shuffleArray(otherWords);
                learnedWords = [...learnedWords, ...otherWords.slice(0, 10 - learnedWords.length)];
            }

            shuffleArray(learnedWords);
            quizQuestions = learnedWords.slice(0, 10);
            quizIndex = 0;
            quizScore = 0;

            document.getElementById('quiz-start').style.display = 'none';
            document.getElementById('quiz-card-section').style.display = 'block';
            document.getElementById('quiz-result').style.display = 'none';

            showQuizQuestion();
        }

        function showQuizQuestion() {
            if (quizIndex >= quizQuestions.length) {
                showQuizResult();
                return;
            }

            // 随机选择题型
            const questionType = Math.random() > 0.5 ? 'choice' : 'spell';

            document.getElementById('quiz-choice').style.display = 'none';
            document.getElementById('quiz-spell').style.display = 'none';
            document.getElementById('quiz-choice-next').style.display = 'none';
            document.getElementById('spell-correct-answer').style.display = 'none';

            // 更新进度
            document.getElementById('quiz-progress-fill').style.width = ((quizIndex + 1) / quizQuestions.length * 100) + '%';
            document.getElementById('quiz-progress-text').textContent = `${quizIndex + 1} / ${quizQuestions.length}`;

            if (questionType === 'choice') {
                showChoiceQuestion();
            } else {
                showSpellQuestion();
            }
        }

        // ==================== 题型A：选择题 ====================
        function showChoiceQuestion() {
            const correctWord = quizQuestions[quizIndex];
            document.getElementById('quiz-choice').style.display = 'block';
            document.getElementById('quiz-choice-word').textContent = correctWord.word;

            // 生成干扰项
            const distractors = generateDistractors(correctWord.word, 'meaning');
            const options = [correctWord, ...distractors];
            shuffleArray(options);

            const optionsHtml = options.map((o, i) =>
                `<div class="quiz-option" data-word="${o.word}" onclick="checkChoice(this, '${o.word}', '${correctWord.word}')">${o.meaning.substring(0, 60)}${o.meaning.length > 60 ? '...' : ''}</div>`
            ).join('');

            document.getElementById('quiz-choice-options').innerHTML = optionsHtml;
        }

        function generateDistractors(correctWordId, type) {
            const others = words.filter(w => w.word !== correctWordId);
            shuffleArray(others);
            return others.slice(0, 3);
        }

        function checkChoice(element, selected, correct) {
            const options = document.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.classList.add('disabled'));

            if (selected === correct) {
                element.classList.add('correct');
                quizScore++;
                // 正确：自动下一题
                setTimeout(() => {
                    quizIndex++;
                    showQuizQuestion();
                }, 1000);
            } else {
                element.classList.add('wrong');
                options.forEach(opt => {
                    if (opt.dataset.word === correct) opt.classList.add('correct');
                });
                // 错误：显示下一题按钮
                document.getElementById('quiz-choice-next').style.display = 'block';
            }
        }

        // ==================== 题型B：拼写题 ====================
        function showSpellQuestion() {
            const correctWord = quizQuestions[quizIndex];
            document.getElementById('quiz-spell').style.display = 'block';

            // 显示中文释义
            document.getElementById('spell-meaning').textContent = correctWord.meaning.substring(0, 50);
            document.getElementById('spell-hint').textContent = '点击字母拼写俄语单词';

            // 去除重音，转小写
            currentSpellAnswer = removeStress(correctWord.word.toLowerCase());

            // 生成字母池
            const letterPool = generateLetterPool(currentSpellAnswer);

            // 渲染槽位
            spellSlots = new Array(currentSpellAnswer.length).fill('');
            renderSpellSlots();
            renderLetterPool(letterPool);

            // 隐藏确认按钮，等填满后再显示
            document.getElementById('spell-submit').classList.remove('show');
        }

        function removeStress(word) {
            // 移除俄语重音符号
            return word.replace(/́/g, '').replace(/̀/g, '');
        }

        function generateLetterPool(answer) {
            const answerLetters = answer.split('');

            // 添加干扰字母
            const distractorCount = 3 + Math.floor(Math.random() * 3);
            const distractors = [];

            // 优先添加易混淆字母
            for (let i = 0; i < distractorCount; i++) {
                let letter;
                if (Math.random() > 0.5 && CONFUSING_LETTERS.length > 0) {
                    letter = CONFUSING_LETTERS[Math.floor(Math.random() * CONFUSING_LETTERS.length)];
                } else {
                    letter = RUSSIAN_ALPHABET[Math.floor(Math.random() * RUSSIAN_ALPHABET.length)];
                }
                distractors.push(letter);
            }

            const pool = [...answerLetters, ...distractors];
            shuffleArray(pool);
            return pool;
        }

        function renderSpellSlots() {
            const container = document.getElementById('spell-slots');
            container.innerHTML = spellSlots.map((letter, i) =>
                `<div class="spell-slot ${letter ? 'filled' : ''} ${letter && letter !== currentSpellAnswer[i] ? 'error' : ''}" data-index="${i}" onclick="removeSlotLetter(${i})">${letter}</div>`
            ).join('');
        }

        function renderLetterPool(letters) {
            const container = document.getElementById('spell-pool');
            container.innerHTML = letters.map((letter, i) =>
                `<div class="spell-tile" data-letter="${letter}" data-index="${i}" onclick="addLetterToSlot('${letter}', ${i})">${letter}</div>`
            ).join('');
        }

        function addLetterToSlot(letter, poolIndex) {
            // 找到第一个空槽
            const emptyIndex = spellSlots.findIndex(s => s === '');
            if (emptyIndex === -1) return;

            spellSlots[emptyIndex] = letter;
            renderSpellSlots();

            // 标记字母池中的字母为已用
            const tiles = document.querySelectorAll('.spell-tile');
            tiles[poolIndex].classList.add('used');

            // 检查是否填满
            if (!spellSlots.includes('')) {
                document.getElementById('spell-submit').classList.add('show');
            }
        }

        function removeSlotLetter(slotIndex) {
            const letter = spellSlots[slotIndex];
            if (!letter) return;

            spellSlots[slotIndex] = '';
            renderSpellSlots();

            // 恢复字母池中的字母
            const tiles = document.querySelectorAll('.spell-tile');
            for (const tile of tiles) {
                if (tile.dataset.letter === letter && tile.classList.contains('used')) {
                    tile.classList.remove('used');
                    break;
                }
            }

            document.getElementById('spell-submit').classList.remove('show');
        }

        function checkSpelling() {
            const answer = spellSlots.join('');
            const slots = document.querySelectorAll('.spell-slot');

            if (answer === currentSpellAnswer) {
                // 正确
                slots.forEach(s => s.classList.add('correct'));
                quizScore++;

                setTimeout(() => {
                    quizIndex++;
                    showQuizQuestion();
                }, 1000);
            } else {
                // 错误 - 标红错误位置
                const container = document.getElementById('spell-slots');
                container.classList.add('shake');

                slots.forEach((s, i) => {
                    if (spellSlots[i] !== currentSpellAnswer[i]) {
                        s.classList.add('error');
                    }
                });

                setTimeout(() => {
                    container.classList.remove('shake');
                }, 400);

                // 显示正确答案和下一题按钮
                document.getElementById('spell-submit').style.display = 'none';
                document.getElementById('spell-correct-word').textContent = currentSpellAnswer;
                document.getElementById('spell-correct-answer').style.display = 'block';
            }
        }

        function nextQuizQuestion() {
            quizIndex++;
            showQuizQuestion();
        }

        function showQuizResult() {
            document.getElementById('quiz-card-section').style.display = 'none';
            document.getElementById('quiz-choice').style.display = 'none';
            document.getElementById('quiz-spell').style.display = 'none';
            document.getElementById('quiz-result').style.display = 'block';

            document.getElementById('quiz-score').textContent = `${quizScore} / ${quizQuestions.length}`;
            document.getElementById('quiz-percent').textContent = `正确率: ${Math.round(quizScore / quizQuestions.length * 100)}%`;
        }

        function finishQuiz() {
            document.getElementById('quiz-start').style.display = 'block';
            document.getElementById('quiz-result').style.display = 'none';
            updateQuizStart();
        }

        // ==================== 工具函数 ====================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // ==================== AI 解释 ====================
        async function showAiExplanation(word, meaning) {
            document.getElementById('ai-panel').classList.add('show');
            document.getElementById('ai-word').textContent = word;
            document.getElementById('ai-content').innerHTML = '<div class="ai-loading"><i class="fas fa-spinner"></i><br><br>正在获取AI解释...</div>';

            const prompt = `请详细解释俄语单词"${word}"，包括：
1. 词性和性（阳性/阴性/中性）
2. 重音位置
3. 中文释义
4. 变格/变位表（如果是名词或动词）
5. 3个实用例句（俄语+中文翻译）
6. 常见搭配
7. 记忆技巧
单词基本释义：${meaning}`;

            const promises = APIS.map(api =>
                fetch(api.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${api.key}` },
                    body: JSON.stringify({ model: api.model, messages: [{ role: 'user', content: prompt }], temperature: 0.7 })
                }).then(res => res.json()).then(data => ({ ...data, apiName: api.name })).catch(() => null)
            );

            try {
                const results = await Promise.all(promises);
                const success = results.find(r => r && r.choices && r.choices[0]);

                if (success) {
                    document.getElementById('ai-content').innerHTML = success.choices[0].message.content
                        .replace(/\n/g, '<br>')
                        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                        .replace(/(\d+\.) /g, '<h4 style="color: var(--accent-blue); margin: 15px 0 8px;">$1</h4>');
                } else {
                    throw new Error('API请求失败');
                }
            } catch (e) {
                document.getElementById('ai-content').innerHTML = `<p style="color: var(--accent-red);">获取AI解释失败</p><p style="margin-top: 15px;"><strong>基本释义：</strong></p><p>${meaning}</p>`;
            }
        }

        function closeAiPanel() {
            document.getElementById('ai-panel').classList.remove('show');
        }

        // ==================== 重置 ====================
        function resetProgress() {
            if (confirm('确定要重置所有学习进度吗？此操作不可恢复！')) {
                progress = {};
                localStorage.removeItem(STORAGE_KEY);
                updateStats();
                renderWordList();
                updateLearnStart();
                updateQuizStart();
                alert('进度已重置！');
            }
        }
    </script>
</body>
</html>
